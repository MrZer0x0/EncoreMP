name: Windows Build

on:
  push:
    branches:
      - 'master'
      - 'main'
      - 'fix/*'
      - 'feat/*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  Windows:
    runs-on: windows-2022

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # ── Кэшируем скачанные зависимости ──
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: deps
          key: win-deps-v4-${{ hashFiles('CI/before_script.msvc.sh', '.github/workflows/windows.yml') }}
          restore-keys: |
            win-deps-v4-

      # ── Скачиваем CrabNet (замена RakNet) ──
      - name: Download CrabNet
        run: |
          curl -o CrabNet.7z -L \
            https://github.com/DreamWeave-MP/CrabNet/releases/download/Stable-CI/CrabNet-Windows-Release.7z
          7z x -y CrabNet.7z -oextern/raknet

      # ── Запуск штатного скрипта подготовки зависимостей MSVC ──
      - name: Setup Dependencies & Configure
        run: |
          bash CI/before_script.msvc.sh \
            -c ${{ env.BUILD_TYPE }} \
            -p Win64 \
            -v 2022 \
            -V \
            -i "${{ github.workspace }}/install"

      # ── Сборка ──
      - name: Build
        run: |
          cmake --build MSVC2022_64 --config ${{ env.BUILD_TYPE }} --parallel

      # ── Установка ──
      - name: Install
        run: |
          cmake --install MSVC2022_64 --config ${{ env.BUILD_TYPE }}

      # ── Упаковка артефакта ──
      - name: Package
        run: |
          cd "${{ github.workspace }}/install"
          7z a -mx=5 "${{ github.workspace }}/EncoreMP-Windows-x64.7z" .

      # ── Загрузка артефакта в GitHub ──
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EncoreMP-Windows-x64
          path: EncoreMP-Windows-x64.7z
          retention-days: 30
