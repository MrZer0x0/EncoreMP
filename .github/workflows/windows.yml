name: Windows Build

on:
  push:
    branches:
      - 'master'
      - 'main'
      - 'fix/*'
      - 'feat/*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  Windows:
    runs-on: windows-2022

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # ── Кэшируем скачанные зависимости ──
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: deps
          key: win-deps-v3-${{ hashFiles('CI/before_script.msvc.sh') }}
          restore-keys: |
            win-deps-v3-

      # ── Скачиваем CrabNet (замена RakNet) ──
      - name: Download CrabNet
        run: |
          curl -o CrabNet.7z -L \
            https://github.com/DreamWeave-MP/CrabNet/releases/download/Stable-CI/CrabNet-Windows-Release.7z
          7z x -y CrabNet.7z -oextern/raknet

      # ── Фикс: aqtinstall 1.1.3 не работает с setuptools>=82 ──
      # setuptools 82+ удалил pkg_resources, который нужен aqtinstall 1.1.3
      # Два варианта фикса (раскомментируйте ОДИН):

      # --- Вариант A: Обновить aqtinstall в скрипте (рекомендуется) ---
      - name: Fix aqtinstall version
        run: |
          # Заменяем aqtinstall==1.1.3 на совместимую версию
          sed -i 's/aqtinstall==1.1.3/aqtinstall>=3.1.0/g' CI/before_script.msvc.sh
          # Обновляем команду aqt install (API изменился в v3)
          # В aqt v3: "aqt install-qt" вместо "aqt install"
          sed -i 's|aqt\" install ${QT_VER}|aqt\" install-qt|' CI/before_script.msvc.sh
          # Полная команда: aqt install-qt windows desktop 5.15.2 win64_msvc2019_64
          sed -i 's|install-qt ${QT_VER} windows desktop|install-qt windows desktop ${QT_VER}|' CI/before_script.msvc.sh

      # --- Вариант B (альтернатива): Понизить setuptools ---
      # - name: Fix setuptools version
      #   run: |
      #     sed -i 's/pip install --upgrade pip setuptools wheel/pip install --upgrade pip "setuptools<81" wheel/g' CI/before_script.msvc.sh

      # ── Запуск штатного скрипта подготовки зависимостей MSVC ──
      - name: Setup Dependencies & Configure
        run: |
          CI/before_script.msvc.sh \
            -c ${{ env.BUILD_TYPE }} \
            -p x64 \
            -v 2022 \
            -V \
            -i "${{ github.workspace }}/install"

      # ── Сборка ──
      - name: Build
        run: |
          cd MSVC2022_64
          cmake --build . --config ${{ env.BUILD_TYPE }} -- //m:$(nproc)

      # ── Установка ──
      - name: Install
        run: |
          cd MSVC2022_64
          cmake --install . --config ${{ env.BUILD_TYPE }}

      # ── Упаковка артефакта ──
      - name: Package
        run: |
          cd "${{ github.workspace }}/install"
          7z a -mx=5 "${{ github.workspace }}/EncoreMP-Windows-x64.7z" .

      # ── Загрузка артефакта в GitHub ──
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EncoreMP-Windows-x64
          path: EncoreMP-Windows-x64.7z
          retention-days: 30
