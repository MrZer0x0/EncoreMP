name: Windows Build

on:
  push:
    branches:
      - 'master'
      - 'main'
      - 'fix/*'
      - 'feat/*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  Windows:
    runs-on: windows-2022

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # ── Кэшируем скачанные зависимости ──
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: deps
          key: win-deps-v3-${{ hashFiles('CI/before_script.msvc.sh') }}
          restore-keys: |
            win-deps-v3-

      # ── Скачиваем CrabNet (замена RakNet) ──
      - name: Download CrabNet
        run: |
          curl -o CrabNet.7z -L \
            https://github.com/DreamWeave-MP/CrabNet/releases/download/Stable-CI/CrabNet-Windows-Release.7z
          7z x -y CrabNet.7z -oextern/raknet

      # ── Фикс: aqtinstall 1.1.3 несовместим с setuptools>=82 ──
      # setuptools 82+ удалил pkg_resources. Обновляем aqt до v3 и правим синтаксис.
      - name: Fix aqtinstall compatibility
        run: |
          # 1) Обновляем версию aqtinstall
          sed -i 's/aqtinstall==1.1.3/aqtinstall>=3.1.0/g' CI/before_script.msvc.sh

          # 2) Исправляем команду aqt install → aqt install-qt с правильным порядком аргументов
          #    Старый формат (v1): aqt install <version> windows desktop "<arch>"
          #    Новый формат (v3):  aqt install-qt windows desktop <version> <arch>
          sed -i 's|aqt" install ${QT_VER} windows desktop "win${BITS}_msvc${QT_MSVC_YEAR}${SUFFIX}"|aqt" install-qt windows desktop ${QT_VER} win${BITS}_msvc${QT_MSVC_YEAR}${SUFFIX}|' CI/before_script.msvc.sh

          # Проверяем результат
          echo "=== Patched aqt line ==="
          grep -n "aqt.*install-qt\|aqtinstall" CI/before_script.msvc.sh

      # ── Запуск штатного скрипта подготовки зависимостей MSVC ──
      - name: Setup Dependencies & Configure
        run: |
          CI/before_script.msvc.sh \
            -c ${{ env.BUILD_TYPE }} \
            -p x64 \
            -v 2022 \
            -V \
            -i "${{ github.workspace }}/install"

      # ── Сборка ──
      - name: Build
        run: |
          cd MSVC2022_64
          cmake --build . --config ${{ env.BUILD_TYPE }} -- //m:$(nproc)

      # ── Установка ──
      - name: Install
        run: |
          cd MSVC2022_64
          cmake --install . --config ${{ env.BUILD_TYPE }}

      # ── Упаковка артефакта ──
      - name: Package
        run: |
          cd "${{ github.workspace }}/install"
          7z a -mx=5 "${{ github.workspace }}/EncoreMP-Windows-x64.7z" .

      # ── Загрузка артефакта в GitHub ──
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EncoreMP-Windows-x64
          path: EncoreMP-Windows-x64.7z
          retention-days: 30
